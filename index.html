<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Xem quảng cáo – Nhận lượt tải</title>

  <!-- Telegram Mini App SDK (bắt buộc) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag Rewarded Interstitial SDK -->
  <!-- Tag được lấy từ miniapp-publishers-monetag-com.txt (dòng <script ...>) -->
  <!-- Để đổi zone: sửa file .txt + đổi dòng này theo -->
  <script src="https://libtl.com/sdk.js" data-zone="10702648" data-sdk="show_10702648"></script>

  <!-- Adsgram Rewarded SDK -->
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <style>
    :root {
      --tg-bg:     var(--tg-theme-bg-color,       #1a1a2e);
      --tg-text:   var(--tg-theme-text-color,      #ffffff);
      --tg-hint:   var(--tg-theme-hint-color,      #aaaaaa);
      --tg-btn:    var(--tg-theme-button-color,    #5865f2);
      --tg-btn-t:  var(--tg-theme-button-text-color,#ffffff);
      --accent:    #7c3aed;
      --success:   #10b981;
      --danger:    #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .card h2 { font-size: 1.25rem; margin-bottom: 6px; }
    .card .subtitle { color: var(--tg-hint); font-size: 0.875rem; margin-bottom: 24px; }

    /* ── Ad container ── */
    #ad-container {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin-bottom: 20px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #ad-video {
      width: 100%;
      max-height: 300px;
      display: none;
    }

    #ad-banner {
      width: 100%;
      display: none;
      cursor: pointer;
      border-radius: 12px;
    }

    /* PropellerAds / Adsterra iframe container */
    #ad-external {
      width: 100%;
      min-height: 250px;
      display: none;
    }

    .ad-placeholder {
      color: var(--tg-hint);
      font-size: 0.8rem;
      padding: 40px 20px;
    }

    /* ── Countdown ring ── */
    .countdown-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
    }

    .countdown-wrap svg { transform: rotate(-90deg); }

    .countdown-wrap circle {
      fill: none;
      stroke-width: 5;
    }

    .countdown-bg   { stroke: rgba(255,255,255,0.1); }
    .countdown-bar  { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

    .countdown-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary  { background: var(--tg-btn); color: var(--tg-btn-t); }
    .btn-success  { background: var(--success); color: #fff; }
    .btn-outline  { background: transparent; border: 2px solid var(--tg-btn); color: var(--tg-btn); margin-top: 10px; }

    /* ── Status messages ── */
    #status-msg {
      font-size: 0.875rem;
      margin-top: 14px;
      min-height: 20px;
      color: var(--tg-hint);
    }
    #status-msg.ok     { color: var(--success); }
    #status-msg.error  { color: var(--danger); }

    /* ── Reward badge ── */
    .reward-badge {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Loading spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

<!-- ══════════════════════════════════ SCREEN: loading ══════════════════════ -->
<div id="screen-loading" class="screen active card">
  <div class="spinner"></div>
  <p style="color:var(--tg-hint);font-size:0.85rem">Đang tải quảng cáo...</p>
</div>

<!-- ══════════════════════════════════ SCREEN: watch ════════════════════════ -->
<div id="screen-watch" class="screen card">
  <h2>🎬 Xem quảng cáo</h2>
  <p class="subtitle">Xem hết để nhận +1 lượt tải miễn phí</p>

  <div id="ad-container">
    <!-- Video ad (internal) -->
    <video id="ad-video" playsinline muted></video>

    <!-- Banner ad (internal) -->
    <img id="ad-banner" alt="Quảng cáo" />

    <!-- External ad network (PropellerAds / Adsterra) -->
    <div id="ad-external"></div>

    <div class="ad-placeholder" id="ad-placeholder">Đang tải quảng cáo...</div>
  </div>

  <!-- Countdown ring -->
  <div class="countdown-wrap" id="countdown-wrap" style="display:none">
    <svg viewBox="0 0 80 80" width="80" height="80">
      <circle class="countdown-bg" cx="40" cy="40" r="35"/>
      <circle class="countdown-bar" id="countdown-bar" cx="40" cy="40" r="35"
              stroke-dasharray="219.9" stroke-dashoffset="0"/>
    </svg>
    <div class="countdown-number" id="countdown-number">10</div>
  </div>

  <button class="btn btn-success" id="btn-claim" disabled>
    ✅ Nhận +1 lượt tải
  </button>

  <button class="btn btn-outline" id="btn-skip" onclick="Telegram.WebApp.close()">
    Bỏ qua
  </button>

  <div id="status-msg"></div>
</div>

<!-- ══════════════════════════════════ SCREEN: success ══════════════════════ -->
<div id="screen-success" class="screen card">
  <div class="reward-badge">🎉</div>
  <h2>Bạn đã nhận được +1 lượt tải!</h2>
  <p class="subtitle" id="success-count"></p>
  <button class="btn btn-primary" style="margin-top:24px"
          onclick="Telegram.WebApp.close()">
    Quay lại bot
  </button>
</div>

<!-- ══════════════════════════════════ SCREEN: error ═══════════════════════ -->
<div id="screen-error" class="screen card">
  <div class="reward-badge">⚠️</div>
  <h2 id="error-title">Có lỗi xảy ra</h2>
  <p class="subtitle" id="error-msg"></p>
  <button class="btn btn-outline" style="margin-top:24px"
          onclick="Telegram.WebApp.close()">
    Đóng
  </button>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════
     MAIN SCRIPT
     Kiến trúc: Miniapp KHÔNG gọi API nào.
     Flow: mở → show Monetag rewarded ad → countdown → sendData → bot grant reward
═══════════════════════════════════════════════════════════════════════════ -->
<script>
"use strict";

// ─── Config ───────────────────────────────────────────────────────────────
const _urlParams       = new URLSearchParams(window.location.search);
const AD_WATCH_SECONDS = 10;   // giây đếm ngược tối thiểu
const AD_MODE          = _urlParams.get('mode') || 'monetag';  // 'monetag' hoặc 'adsgram'

// ─── Telegram WebApp init ─────────────────────────────────────────────────
const tg     = window.Telegram.WebApp;
tg.ready();
tg.expand();

const user   = tg.initDataUnsafe?.user || {};
const userId = user.id || 0;

// ─── State ────────────────────────────────────────────────────────────────
let countdownTimer = null;
let adWatched      = false;
const APP_OPEN_TS  = Date.now();   // thời điểm mở app (ms)
let   AD_DONE_TS   = 0;            // thời điểm Monetag resolve (ms)

// ─── UI helpers ───────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function setStatus(msg, type = "") {
  const el = document.getElementById("status-msg");
  el.textContent = msg;
  el.className   = type;
}

// ─── Countdown ring ───────────────────────────────────────────────────────
const CIRCUM = 2 * Math.PI * 35;  // ≈ 219.9

function startCountdown(totalSeconds) {
  const bar      = document.getElementById("countdown-bar");
  const numEl    = document.getElementById("countdown-number");
  const wrap     = document.getElementById("countdown-wrap");
  const claimBtn = document.getElementById("btn-claim");

  wrap.style.display = "";
  let remaining = totalSeconds;
  numEl.textContent = remaining;
  bar.style.strokeDashoffset = 0;

  countdownTimer = setInterval(() => {
    remaining--;
    numEl.textContent = remaining;
    bar.style.strokeDashoffset = CIRCUM * (1 - remaining / totalSeconds);

    if (remaining <= 0) {
      clearInterval(countdownTimer);
      countdownTimer = null;
      if (adWatched) {
        claimBtn.disabled = false;
        setStatus("Nhấn nút bên dưới để nhận lượt tải!", "ok");
      }
    }
  }, 1000);
}

// ─── Đánh dấu đã xem xong → mở nút nhận ──────────────────────────────────
function markAdWatched() {
  adWatched = true;
  if (!countdownTimer) {
    // Countdown đã xong trước → mở nút ngay
    document.getElementById("btn-claim").disabled = false;
    setStatus("Nhấn nút bên dưới để nhận lượt tải!", "ok");
  }
  // Nếu countdown chưa xong → nút sẽ mở khi countdown kết thúc
}

// ─── Monetag Rewarded Interstitial ────────────────────────────────────────
function showMonetagAd() {
  const container = document.getElementById("ad-external");
  document.getElementById("ad-placeholder").style.display = "none";
  container.style.display = "block";

  container.innerHTML = `
    <div style="padding:30px 20px;text-align:center">
      <p style="color:var(--tg-hint);font-size:0.8rem;margin-bottom:12px">
        Xem quảng cáo để được tải link ngay
      </p>
      <button class="btn btn-primary" id="btn-show-monetag" style="max-width:280px">
        👁 Nhấn để xem quảng cáo
      </button>
      <p id="monetag-status" style="color:var(--tg-hint);font-size:0.78rem;margin-top:10px"></p>
    </div>`;

  document.getElementById("btn-show-monetag").addEventListener("click", function () {
    const adBtn    = document.getElementById("btn-show-monetag");
    const adStatus = document.getElementById("monetag-status");
    adBtn.disabled = true;
    adStatus.textContent = "Đang tải quảng cáo...";

    // Lấy hàm SDK từ data-sdk attribute của thẻ script Monetag trong <head>
    const sdkScript = document.querySelector("script[data-sdk]");
    const fnName    = sdkScript ? sdkScript.getAttribute("data-sdk") : null;
    const showAd    = fnName ? window[fnName] : null;

    if (typeof showAd !== "function") {
      adStatus.textContent = "SDK chưa sẵn sàng. Vui lòng thử lại.";
      adBtn.disabled = false;
      return;
    }

    showAd()
      .then(() => {
        AD_DONE_TS = Date.now();   // ghi thời điểm xem xong
        window._adSource = "monetag";
        adStatus.textContent = "✅ Đã xem xong!";
        adStatus.style.color = "var(--success)";
        startCountdown(AD_WATCH_SECONDS);
        markAdWatched();
      })
      .catch(() => {
        adStatus.textContent = "Quảng cáo bị bỏ qua. Vui lòng xem hết để nhận lượt tải.";
        adStatus.style.color = "var(--danger)";
        adBtn.disabled = false;
      });
  });
}

// ─── Adsgram Rewarded Ad ─────────────────────────────────────────────────
let AdsgramController = null;
try {
  if (window.Adsgram) {
    AdsgramController = window.Adsgram.init({ blockId: "24779" });
  }
} catch (e) { /* SDK chưa load */ }

function _handleAdsgramClick() {
  const btn    = document.getElementById("btn-show-adsgram");
  const status = document.getElementById("adsgram-status");
  if (!btn) return;

  if (!AdsgramController) {
    try { AdsgramController = window.Adsgram.init({ blockId: "24779" }); }
    catch (e) {
      if (status) status.textContent = "SDK chưa sẵn sàng. Vui lòng thử lại.";
      return;
    }
  }

  btn.disabled = true;
  if (status) status.textContent = "Đang tải quảng cáo...";

  AdsgramController.show()
    .then((result) => {
      if (result.done) {
        AD_DONE_TS = Date.now();
        window._adSource = "adsgram";
        if (status) { status.textContent = "✅ Đã xem xong!"; status.style.color = "var(--success)"; }
        startCountdown(AD_WATCH_SECONDS);
        markAdWatched();
      } else {
        if (status) { status.textContent = "Quảng cáo chưa xem hết. Vui lòng thử lại."; status.style.color = "var(--danger)"; }
        btn.disabled = false;
      }
    })
    .catch((e) => {
      const msg = e ? String(e).toLowerCase() : '';
      const noAds = msg.includes('no ad') || msg.includes('no fill') || msg.includes('no inventory');
      if (status) {
        status.textContent = noAds
          ? "⚠️ Hiện không có quảng cáo. Vui lòng thử lại sau!"
          : "Quảng cáo bị bỏ qua hoặc có lỗi. Vui lòng thử lại.";
        status.style.color = "var(--danger)";
      }
      btn.disabled = false;
    });
}

// ─── Adsgram-only UI (dùng khi ?mode=adsgram) ────────────────────────────
function showAdsgramAdUI() {
  const container = document.getElementById("ad-external");
  document.getElementById("ad-placeholder").style.display = "none";
  container.style.display = "block";
  container.innerHTML = `
    <div style="padding:30px 20px;text-align:center">
      <p style="color:var(--tg-hint);font-size:0.8rem;margin-bottom:12px">
        Xem quảng cáo để nhận +1 lượt tải bonus
      </p>
      <button class="btn btn-primary" id="btn-show-adsgram" style="max-width:280px">
        🎁 Nhấn để xem quảng cáo bonus
      </button>
      <p id="adsgram-status" style="color:var(--tg-hint);font-size:0.78rem;margin-top:10px"></p>
    </div>`;
  document.getElementById("btn-show-adsgram").addEventListener("click", _handleAdsgramClick);
}

// Event listener cho nút Adsgram trong chế độ song song Monetag (btn được tạo runtime)
document.addEventListener("click", function(e) {
  if (e.target && e.target.id === "btn-show-adsgram" && AD_MODE !== 'adsgram') {
    _handleAdsgramClick();
  }
});

// ─── Claim reward: gọi sendData → bot tự cộng lượt tải ──────────────────
document.getElementById("btn-claim").addEventListener("click", () => {
  const btn = document.getElementById("btn-claim");
  btn.disabled = true;
  setStatus("Đang gửi xác nhận...");

  try {
    const now       = Date.now();
    const elapsedMs = AD_DONE_TS > 0 ? (AD_DONE_TS - APP_OPEN_TS) : 0;
    // Gửi proof để bot kiểm tra:
    // - open_ts : lúc mở app
    // - ad_ts   : lúc Monetag resolve
    // - elapsed : khoảng cách (ms) — phải >= AD_WATCH_SECONDS * 1000
    tg.sendData(JSON.stringify({
      action:    "ad_watched",
      source:    window._adSource || "monetag",  // monetag hoặc adsgram
      open_ts:   APP_OPEN_TS,
      ad_ts:     AD_DONE_TS,
      elapsed:   elapsedMs,
      claim_ts:  now,
    }));
  } catch (err) {
    btn.disabled = false;
    setStatus("Lỗi: " + err.message, "error");
  }
});

// ─── Error screen ─────────────────────────────────────────────────────────
function showError(title, msg) {
  document.getElementById("error-title").textContent = title;
  document.getElementById("error-msg").textContent   = msg;
  showScreen("screen-error");
}

// ─── Boot ─────────────────────────────────────────────────────────────────
if (!userId) {
  showError("Lỗi xác thực", "Trang này chỉ hoạt động khi mở trong Telegram, không phải trình duyệt.");
} else {
  showScreen("screen-watch");
  if (AD_MODE === 'adsgram') {
    // Chế độ Adsgram: tăng lượt bonus (từ menu cài đặt)
    window._adSource = 'adsgram';
    document.querySelector('#screen-watch h2').textContent = '🎁 Xem quảng cáo tăng lượt tải';
    document.querySelector('#screen-watch .subtitle').textContent = 'Xem hết để nhận +1 lượt tải bonus';
    document.getElementById('btn-claim').textContent = '✅ Nhận +1 lượt tải bonus';
    showAdsgramAdUI();
  } else {
    // Chế độ Monetag: bypass 1 lần để tải link đang chờ
    window._adSource = 'monetag';
    document.querySelector('#screen-watch h2').textContent = '🎬 Xem quảng cáo';
    document.querySelector('#screen-watch .subtitle').textContent = 'Xem xong → tải tự động ngay lập tức';
    document.getElementById('btn-claim').textContent = '✅ Xác nhận đã xem';
    showMonetagAd();
  }
}
</script>
</body>
</html>
